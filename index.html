<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRSubClassroom</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'caption': ['Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .caption-text {
            font-size: 3rem;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .transcript-line {
            transition: all 0.3s ease;
        }
        .transcript-line:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }
        .word-clickable {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .word-clickable:hover {
            background-color: rgba(59, 130, 246, 0.2);
            border-radius: 4px;
            padding: 2px 4px;
        }
        .translation-text {
            color: #6B7280;
            font-style: italic;
            padding-left: 0.25rem;
            border-left: 2px solid #D1D5DB;
        }
        
        /* Recent lines in live caption area */
        .recent-line {
            font-size: 3rem;
            line-height: 1.2;
            text-align: center;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #E5E7EB;
            margin-bottom: 0.5rem;
        }
        .recent-line:last-child {
            border-bottom: none;
            margin-bottom: 1rem;
        }
        .recent-line .recent-translation {
            font-size: 2rem;
            color: #6B7280;
            font-style: italic;
            margin-top: 0.25rem;
        }
        
        /* Larger transcript text to match live caption */
        .transcript-line .original-text {
            font-size: 3rem;
            line-height: 1.3;
        }
        .transcript-line .translation-text {
            font-size: 2rem;
            margin-top: 0.5rem;
            padding-left: 0.5rem;
        }
        .popover {
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .sidebar {
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        .sidebar.open {
            transform: translateX(0);
        }
        
        /* Fix the main layout to prevent overflow */
        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Important: allows flex children to shrink */
            padding: 1.5rem;
            padding-bottom: 2rem; /* Extra bottom padding for breathing room */
        }
        
        .transcript-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Important: allows flex children to shrink */
            margin-top: 1.5rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        /* Ensure transcript container has proper height and scrolling */
        #transcriptContainer {
            flex: 1;
            overflow-y: auto;
            min-height: 0; /* Important: allows flex children to shrink */
        }
        
        /* Smooth scrolling for all browsers */
        #transcriptContainer {
            scroll-behavior: smooth;
        }
        
        /* Neon purple glow button */
        .btn-neon {
            background: linear-gradient(135deg, #A855F7 0%, #D946EF 100%);
            box-shadow: 0 0 20px rgba(217, 70, 239, 0.5), 0 0 40px rgba(168, 85, 247, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .btn-neon:hover {
            background: linear-gradient(135deg, #C084FC 0%, #E879F9 100%);
            box-shadow: 0 0 30px rgba(217, 70, 239, 0.7), 0 0 60px rgba(168, 85, 247, 0.5);
            transform: translateY(-1px);
        }
        
        /* Metallic grey button */
        .btn-metallic {
            background: linear-gradient(180deg, #94A3B8 0%, #64748B 50%, #475569 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.2), 0 2px 4px rgba(0,0,0,0.2);
            border: 1px solid #475569;
            transition: all 0.3s ease;
        }
        .btn-metallic:hover {
            background: linear-gradient(180deg, #A3B3C6 0%, #7689A0 50%, #5A6B80 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -1px 0 rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.3);
        }
        .btn-metallic:disabled {
            background: linear-gradient(180deg, #CBD5E1 0%, #94A3B8 50%, #64748B 100%);
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="main-container">
        <!-- Top Bar -->
        <div class="bg-white shadow-sm border-b px-6 py-4 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-bold text-gray-800">QRSubClassroom</h1>
            </div>
            
            <div class="flex items-center space-x-3">
                <button id="startBtn" class="btn-neon text-white px-4 py-2 rounded-lg font-medium">
                    Start
                </button>
                <button id="clearBtn" class="btn-metallic text-white px-4 py-2 rounded-lg font-medium">
                    Clear Screen
                </button>
                <button id="downloadBtn" class="btn-metallic text-white px-4 py-2 rounded-lg font-medium">
                    Download .txt
                </button>
                <div class="flex items-center space-x-2">
                    <label for="recognitionLang" class="text-sm text-gray-600">Listen for:</label>
                    <select id="recognitionLang" class="bg-white border border-gray-300 text-gray-700 px-3 py-2 rounded-lg font-medium focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                        <option value="en-US">English</option>
                        <option value="th-TH">Thai (ไทย)</option>
                        <option value="zh-CN">Chinese (中文)</option>
                    </select>
                </div>
                <div class="flex items-center space-x-2">
                    <label for="translationLang" class="text-sm text-gray-600">Translate to:</label>
                    <select id="translationLang" class="bg-white border border-gray-300 text-gray-700 px-3 py-2 rounded-lg font-medium focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                        <option value="en">English</option>
                        <option value="th" selected>Thai (ไทย)</option>
                        <option value="zh">Chinese (中文)</option>
                    </select>
                </div>
                <button id="qrBtn" class="btn-neon text-white px-4 py-2 rounded-lg font-medium">
                    📱 QR Code
                </button>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="content-area">
            <!-- Live Caption Area -->
            <div id="captionArea" class="bg-white shadow-lg p-8 rounded-lg flex-shrink-0">
                <!-- Container for recent finalized lines -->
                <div id="recentLines" class="space-y-4">
                    <!-- Recent finalized lines will be inserted here -->
                </div>
                <!-- Current interim text -->
                <div id="liveCaption" class="caption-text text-gray-800 text-center">
                    Click "Start" to begin speech recognition...
                </div>
            </div>

            <!-- Transcript Area -->
            <div class="transcript-wrapper">
                <div class="bg-gray-50 px-6 py-3 border-b flex items-center justify-between flex-shrink-0">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-700">Transcript</h2>
                        <span id="lineCount" class="text-sm text-gray-500">0 lines</span>
                    </div>
                    <div class="text-xs text-gray-400">
                        Scroll up to read history • Auto-scrolls to new content
                    </div>
                </div>
                <div id="transcriptContainer" class="p-6">
                    <div id="transcriptContent" class="space-y-1">
                        <!-- Transcript lines will be added here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar Toggle Button -->
    <button id="sidebarToggle" class="fixed bottom-6 right-6 btn-neon text-white p-3 rounded-full">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
        </svg>
    </button>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar fixed top-0 right-0 h-full w-80 bg-white shadow-xl border-l">
        <div class="bg-purple-500 text-white px-6 py-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold">My Words</h2>
            <button id="closeSidebar" class="text-white hover:text-gray-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div id="savedWords" class="p-6 overflow-y-auto h-full">
            <!-- Saved words will be displayed here -->
        </div>
    </div>

    <!-- Translation Popover -->
    <div id="translationPopover" class="popover fixed hidden bg-white border border-gray-200 rounded-lg shadow-lg p-4 max-w-xs">
        <div class="flex items-start justify-between">
            <div class="flex-1">
                <div class="font-medium text-gray-900 mb-2">
                    <span id="popoverWord"></span>
                </div>
                <div id="popoverTranslation" class="text-gray-600 mb-3">
                    Loading translation...
                </div>
                <button id="saveWordBtn" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm transition-colors">
                    Save Word
                </button>
            </div>
            <button id="closePopover" class="text-gray-400 hover:text-gray-600 ml-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
